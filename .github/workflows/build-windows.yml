name: Build Release (Windows, Linux, macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build (Windows)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Загрузка зависимостей (yt-dlp, deno, ffmpeg)
        shell: pwsh
        working-directory: tauri-app
        run: |
          if (Test-Path "assets\bin") { Remove-Item -Recurse -Force "assets\bin" }
          New-Item -ItemType Directory -Path "assets\bin" -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "assets\bin\yt-dlp.exe"
          Invoke-WebRequest -Uri "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip" -OutFile "deno.zip"
          Expand-Archive -Path "deno.zip" -DestinationPath "assets\bin" -Force
          Remove-Item "deno.zip"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-temp" -Force
          Copy-Item "ffmpeg-temp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" "assets\bin\ffmpeg.exe"
          Remove-Item -Recurse -Force "ffmpeg-temp"
          Remove-Item "ffmpeg.zip"
          Get-ChildItem "assets\bin"

      - name: Установка NPM зависимостей
        working-directory: tauri-app
        run: npm install

      - name: Сборка Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./tauri-app
          tagName: v__VERSION__
          releaseName: "Universal Media Downloader v__VERSION__"
          releaseBody: |
            🚀 Автоматическая сборка.
            Включены: yt-dlp, Deno, FFmpeg — всё работает из коробки!
          releaseDraft: false
          prerelease: false

  build-linux:
    runs-on: ubuntu-22.04
    name: Build (Linux)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Установка системных библиотек
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Загрузка зависимостей (yt-dlp, deno, ffmpeg)
        working-directory: tauri-app
        run: |
          rm -rf assets/bin
          mkdir -p assets/bin
          curl -L -o assets/bin/yt-dlp "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"
          chmod +x assets/bin/yt-dlp
          curl -L -o /tmp/deno.zip "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip"
          unzip -o /tmp/deno.zip -d assets/bin/
          chmod +x assets/bin/deno
          curl -L -o /tmp/ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp/
          cp /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg assets/bin/ffmpeg
          chmod +x assets/bin/ffmpeg
          ls -la assets/bin/

      - name: Установка NPM зависимостей
        working-directory: tauri-app
        run: npm install

      - name: Сборка Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./tauri-app
          tagName: v__VERSION__
          releaseName: "Universal Media Downloader v__VERSION__"
          releaseBody: |
            🚀 Автоматическая сборка.
            Включены: yt-dlp, Deno, FFmpeg — всё работает из коробки!
          releaseDraft: false
          prerelease: false

  build-macos:
    runs-on: macos-latest
    name: Build (macOS)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Загрузка зависимостей (yt-dlp, deno, ffmpeg)
        working-directory: tauri-app
        run: |
          rm -rf assets/bin
          mkdir -p assets/bin
          curl -L -o assets/bin/yt-dlp "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x assets/bin/yt-dlp
          curl -L -o /tmp/deno.zip "https://github.com/denoland/deno/releases/latest/download/deno-aarch64-apple-darwin.zip"
          unzip -o /tmp/deno.zip -d assets/bin/
          chmod +x assets/bin/deno
          brew install ffmpeg
          cp $(which ffmpeg) assets/bin/ffmpeg
          chmod +x assets/bin/ffmpeg
          ls -la assets/bin/

      - name: Установка NPM зависимостей
        working-directory: tauri-app
        run: npm install

      - name: Сборка Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./tauri-app
          tagName: v__VERSION__
          releaseName: "Universal Media Downloader v__VERSION__"
          releaseBody: |
            🚀 Автоматическая сборка.
            Включены: yt-dlp, Deno, FFmpeg — всё работает из коробки!
          releaseDraft: false
          prerelease: false
