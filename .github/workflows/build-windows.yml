name: Build Release (Windows, Linux, macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            bin_ext: .exe
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
            ytdlp_name: yt-dlp.exe
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip
            deno_name: deno.exe
            ffmpeg_url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
            ffmpeg_archive_path: ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe
            ffmpeg_name: ffmpeg.exe

          - os: ubuntu-22.04
            label: Linux
            bin_ext: ""
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
            ytdlp_name: yt-dlp
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip
            deno_name: deno
            ffmpeg_url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
            ffmpeg_archive_path: ffmpeg-master-latest-linux64-gpl/bin/ffmpeg
            ffmpeg_name: ffmpeg

          - os: macos-latest
            label: macOS
            bin_ext: ""
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
            ytdlp_name: yt-dlp
            deno_url: https://github.com/denoland/deno/releases/latest/download/deno-aarch64-apple-darwin.zip
            deno_name: deno
            ffmpeg_url: ""
            ffmpeg_archive_path: ""
            ffmpeg_name: ""

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Скачивание кода
        uses: actions/checkout@v4

      - name: Установка Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установка Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux: установка системных зависимостей для Tauri
      - name: Установка системных библиотек (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      # Загрузка бинарников
      - name: Загрузка yt-dlp
        shell: bash
        working-directory: tauri-app
        run: |
          rm -rf assets/bin
          mkdir -p assets/bin
          curl -L -o "assets/bin/${{ matrix.ytdlp_name }}" "${{ matrix.ytdlp_url }}"
          chmod +f +x "assets/bin/${{ matrix.ytdlp_name }}" || true

      - name: Загрузка Deno
        shell: bash
        working-directory: tauri-app
        run: |
          curl -L -o /tmp/deno.zip "${{ matrix.deno_url }}"
          unzip -o /tmp/deno.zip -d assets/bin/
          chmod +x "assets/bin/${{ matrix.deno_name }}" || true

      - name: Загрузка FFmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: tauri-app
        run: |
          Invoke-WebRequest -Uri "${{ matrix.ffmpeg_url }}" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-temp" -Force
          Move-Item -Path "ffmpeg-temp/${{ matrix.ffmpeg_archive_path }}" -Destination "assets/bin/${{ matrix.ffmpeg_name }}" -Force
          Remove-Item -Recurse -Force "ffmpeg-temp"
          Remove-Item "ffmpeg.zip"

      - name: Загрузка FFmpeg (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        working-directory: tauri-app
        run: |
          curl -L -o /tmp/ffmpeg.tar.xz "${{ matrix.ffmpeg_url }}"
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp/
          cp "/tmp/${{ matrix.ffmpeg_archive_path }}" "assets/bin/${{ matrix.ffmpeg_name }}"
          chmod +x "assets/bin/${{ matrix.ffmpeg_name }}"

      # macOS: установка ffmpeg через brew (проще и надёжнее чем скачивать бинарник)
      - name: Загрузка FFmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg
          cp $(which ffmpeg) tauri-app/assets/bin/ffmpeg
          chmod +x tauri-app/assets/bin/ffmpeg

      - name: Установка NPM зависимостей
        working-directory: tauri-app
        run: npm install

      - name: Сборка и публикация релиза Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./tauri-app
          tagName: v__VERSION__
          releaseName: "Universal Media Downloader v__VERSION__"
          releaseBody: |
            🚀 Автоматическая сборка для Windows, Linux и macOS.

            **Включены:** yt-dlp, Deno, FFmpeg — всё работает из коробки!

            | Платформа | Файл |
            |-----------|------|
            | Windows | `.exe` / `.msi` |
            | Linux | `.deb` / `.AppImage` |
            | macOS | `.dmg` |
          releaseDraft: false
          prerelease: false
