name: Build Release Windows (EXE)

on:
  # Этот Action срабатывает, когда вы отправляете код на GitHub
  # Чтобы запустить ручную сборку, нужно будет нажать "Run workflow" во вкладке Actions
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Скачивание кода репозитория
        uses: actions/checkout@v4

      - name: Установка Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установка Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Загрузка зависимостей (yt-dlp, deno, ffmpeg)
        shell: pwsh
        working-directory: tauri-app
        run: |
          if (Test-Path "assets/bin") { Remove-Item -Recurse -Force "assets/bin" }
          New-Item -ItemType Directory -Path "assets/bin" -Force | Out-Null
          Set-Location "assets/bin"
          # Загрузка yt-dlp
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"
          # Загрузка Deno
          Invoke-WebRequest -Uri "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip" -OutFile "deno.zip"
          Expand-Archive -Path "deno.zip" -DestinationPath "." -Force
          Remove-Item "deno.zip"
          # Загрузка FFmpeg
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-temp" -Force
          Move-Item -Path "ffmpeg-temp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "ffmpeg.exe" -Force
          Remove-Item -Recurse -Force "ffmpeg-temp"
          Remove-Item "ffmpeg.zip"

      - name: Установка NPM зависимостей
        working-directory: tauri-app
        run: npm install

      - name: Сборка и публикация релиза Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./tauri-app
          tagName: v__VERSION__ # Автоматически возьмет версию из tauri.conf.json
          releaseName: "Установщик v__VERSION__ для Windows"
          releaseBody: "Автоматическая сборка для Windows (.exe и .msi) с помощью GitHub Actions."
          releaseDraft: false
          prerelease: false
